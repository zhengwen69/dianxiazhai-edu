    h += '<div><span class="key" data-i18n="nav.field_teaching_method">教学方式：</span><span class="val" data-i18n="' + (it.type==='theory'?'nav.teaching_method_theory':'nav.teaching_method_practice') + '">' + (it.type==='theory'?'课堂讲授+案例分析+课堂讨论':'实验操作/现场参观') + '</span></div>';
    h += '</div>';
    h += '<div class="info-block"><span class="key" data-i18n="nav.field_content_summary">内容概要：</span><br><span class="val">' + it.desc + '</span></div>';
    h += '</div>';

    if (it.topics.length > 0) {
      h += '<div class="card-footer">';
      h += '<ul class="mini-list" style="column-count:2; column-gap:20px;">';
      it.topics.forEach(function(t){ h += '<li>' + t + '</li>'; });
      h += '</ul>';
      h += '</div>';
    }
    if (it.tags.length > 0) {
      h += '<div class="card-footer">';
      it.tags.forEach(function(t) {
        h += '<span class="badge badge-theory" style="margin-left:0;margin-right:6px;">' + t + '</span>';
      });
      h += '</div>';
    }
    if (it.novel) {
      h += '<div class="card-footer">';
      h += it.novel;
      h += '</div>';
    }
    h += '</div>';
  });
  document.getElementById('cards').innerHTML = h;
  if(window.I18N && I18N.current !== 'zh') I18N.translate();
}

function filter(type) {
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function(t){ t.classList.remove('active'); });
  if (type === 'all') tabs[0].classList.add('active');
  else if (type === 'theory') tabs[1].classList.add('active');
  else tabs[2].classList.add('active');
  buildCards(type);
}

buildCards('all');

document.addEventListener('keydown', function(e) {
  if (e.key >= '1' && e.key <= '8') { filter('theory'); }
});
</script>
