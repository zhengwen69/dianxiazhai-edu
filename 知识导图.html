.main .sub { color: #667788; font-size: 14px; margin-bottom: 30px; }

/* 树形结构 */
.tree { position: relative; padding-left: 0; }
.tree-node { position: relative; }
.tree-children { padding-left: 36px; overflow: hidden; transition: max-height .4s ease; }
.tree-children.collapsed { max-height: 0 !important; }

.node-header {

  border-radius: 8px; transition: background .25s; margin: 2px 0;
  user-select: none;
}
.node-header:hover { background: rgba(91,155,213,.08); }
.node-header .toggle {
  width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
  margin-right: 8px; color: #5b9bd5; font-size: 14px; transition: transform .3s; flex-shrink: 0;
}
.node-header .toggle.open { transform: rotate(90deg); }
.node-header .label { font-size: 16px; }
.node-header .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.dot-chapter { background: #5b9bd5; }
.dot-section { background: #2ecc71; }
.dot-topic { background: #e67e22; }
.dot-detail { background: #8899aa; }
.tag-sm { font-size: 11px; padding: 1px 7px; border-radius: 8px; margin-left: 10px; }
.tag-sm.l1 { background: rgba(91,155,213,.15); color: #5b9bd5; }
.tag-sm.l2 { background: rgba(46,204,113,.15); color: #2ecc71; }

/* 连接线 */
.tree-children { position: relative; }
.tree-children::before {
  content: ''; position: absolute; top: 0; left: 18px; width: 1px; height: 100%;
  background: rgba(91,155,213,.12);
}

/* 动画 */
@keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeSlide .35s ease-out both; }
.d0{animation-delay:0s}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

/* 响应式 */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }

  .sidebar .ch-btn.active { border-bottom-color: #5b9bd5; }
  .main { padding: 20px; }

var cur = 0;
function showChapter(i) {
  cur = i;
  var btns = document.querySelectorAll('.ch-btn');
  btns.forEach(function(b, j){ b.classList.toggle('active', j===i); });
  render();
}

function render() {
  var ch = chapters[cur];
  var h = '<h2>' + ch.title + '</h2>';
  h += '<div class="sub">' + ch.en + ' &nbsp;|&nbsp; ' + ch.hours + ' 学时 &nbsp;|&nbsp; 支撑课程目标 1,2,3</div>';
  h += '<div class="tree">';
  h += buildTree(ch.tree, 0);
  h += '</div>';
  document.getElementById('main').innerHTML = h;

  // 初始化折叠
  var headers = document.querySelectorAll('.node-header');
  headers.forEach(function(hdr) {
    hdr.addEventListener('click', function(e) {
      e.stopPropagation();
      var children = this.nextElementSibling;
      if (children && children.classList.contains('tree-children')) {
        children.classList.toggle('collapsed');
        var toggle = this.querySelector('.toggle');
        if (toggle) toggle.classList.toggle('open');
      }
    });
  });
}

function buildTree(nodes, depth) {
  var h = '';
  nodes.forEach(function(n, idx) {
    var hasKids = n.c && n.c.length > 0;
    var dotClass = n.t === 'chapter' ? 'dot-chapter' : n.t === 'section' ? 'dot-section' : n.t === 'topic' ? 'dot-topic' : 'dot-detail';
    var tagClass = n.t === 'section' ? 'tag-sm l1' : n.t === 'topic' ? 'tag-sm l2' : '';
    var tagText = n.t === 'section' ? '节' : n.t === 'topic' ? '知识点' : '';
    h += '<div class="tree-node fade-in d' + (Math.min(idx,5)) + '">';
    h += '<div class="node-header"><span class="toggle">' + (hasKids ? '▶' : '·') + '</span><span class="dot ' + dotClass + '"></span><span class="label">' + n.l + '</span>';
    if (tagText) h += '<span class="' + tagClass + '">' + tagText + '</span>';
    h += '</div>';
    if (hasKids) {
      h += '<div class="tree-children">' + buildTree(n.c, depth+1) + '</div>';
    }
    h += '</div>';
  });
  return h;
}

showChapter(0);

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); showChapter(Math.min(cur+1, chapters.length-1)); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); showChapter(Math.max(cur-1, 0)); }
});
