.tag-sm.l2 { background: rgba(46,204,113,.15); color: #2ecc71; }

.tree-children::before {

var cur = 0;
function showChapter(i) {
  cur = i;
  var btns = document.querySelectorAll('.ch-btn');
  btns.forEach(function(b, j){ b.classList.toggle('active', j===i); });
  render();
}

function render() {
  var ch = chapters[cur];
  var h = '<h2>' + ch.title + '</h2>';
  h += '<div class="sub">' + ch.en + ' &nbsp;|&nbsp; ' + ch.hours + ' 学时 &nbsp;|&nbsp; 支撑课程目标 1,2,3</div>';
  h += '<div class="tree">';
  h += buildTree(ch.tree, 0);
  h += '</div>';
  document.getElementById('main').innerHTML = h;
  if(window.I18N && I18N.current !== 'zh') I18N.translate();

  // 初始化折叠
  var headers = document.querySelectorAll('.node-header');
  headers.forEach(function(hdr) {
    hdr.addEventListener('click', function(e) {
      e.stopPropagation();
      var children = this.nextElementSibling;
      if (children && children.classList.contains('tree-children')) {
        children.classList.toggle('collapsed');
        var toggle = this.querySelector('.toggle');
        if (toggle) toggle.classList.toggle('open');
      }
    });
  });
}

function buildTree(nodes, depth) {
  var h = '';
  nodes.forEach(function(n, idx) {
    var hasKids = n.c && n.c.length > 0;
    var dotClass = n.t === 'chapter' ? 'dot-chapter' : n.t === 'section' ? 'dot-section' : n.t === 'topic' ? 'dot-topic' : 'dot-detail';
    var tagClass = n.t === 'section' ? 'tag-sm l1' : n.t === 'topic' ? 'tag-sm l2' : '';
    var tagText = n.t === 'section' ? '节' : n.t === 'topic' ? '知识点' : '';
    h += '<div class="tree-node fade-in d' + (Math.min(idx,5)) + '">';
    h += '<div class="node-header"><span class="toggle">' + (hasKids ? '▶' : '·') + '</span><span class="dot ' + dotClass + '"></span><span class="label">' + n.l + '</span>';
    if (tagText) h += '<span class="' + tagClass + '">' + tagText + '</span>';
    h += '</div>';
    if (hasKids) {
      h += '<div class="tree-children">' + buildTree(n.c, depth+1) + '</div>';
    }
    h += '</div>';
  });
  return h;
}

showChapter(0);

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); showChapter(Math.min(cur+1, chapters.length-1)); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); showChapter(Math.max(cur-1, 0)); }
});
