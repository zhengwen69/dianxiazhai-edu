name: Sync UAV to CD-UAV

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone and sync CD-UAV
        env:
          TOKEN: ${{ secrets.CDUAV_TOKEN }}
        run: |
          git clone --depth 1 -b gh-pages https://x-access-token:${TOKEN}@github.com/zhengwen69/CD-UAV.git /tmp/cduav
          cp -f 迁移探索-无人机应用技术.html /tmp/cduav/ 2>/dev/null || true
          cp -f 迁移探索-无人机-学生伴学子门户.html /tmp/cduav/ 2>/dev/null || true
          mkdir -p /tmp/cduav/js && cp -f js/i18n.js /tmp/cduav/js/ 2>/dev/null || true
          mkdir -p /tmp/cduav/lang && cp -f lang/zh.json lang/en.json lang/fr.json lang/de.json lang/th.json lang/ja.json lang/ko.json lang/zh-Hant.json /tmp/cduav/lang/ 2>/dev/null || true
          cp -f Figure1-知识域映射轨迹.png /tmp/cduav/ 2>/dev/null || true
          cp -f Figure2-迁移探索枢纽页.png /tmp/cduav/ 2>/dev/null || true
          cp -f Figure3-无人机应用技术页面.png /tmp/cduav/ 2>/dev/null || true
          cd /tmp/cduav
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@actions.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Auto-sync from cdu-gufei-web-demo"
            git push origin gh-pages
            echo "Synced to CD-UAV."
          fi
